name: storyforge

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-storyforge}
      POSTGRES_USER: ${POSTGRES_USER:-storyforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: --auth=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command:
      - sh
      - -lc
      - exec redis-server --appendonly yes --protected-mode yes --requirepass "$${REDIS_PASSWORD}"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --raw -a \"$${REDIS_PASSWORD}\" ping | grep -qx PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --proxy-headers
      - --forwarded-allow-ips=*
    environment:
      APP_ENV: ${APP_ENV:-production}
      EXPOSE_API_DOCS: ${EXPOSE_API_DOCS:-false}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-storyforge}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-storyforge}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "false"
      STORAGE_BACKEND: local
      STORAGE_LOCAL_ROOT: /app/data/storage
      SOURCE_RETENTION_HOURS: ${SOURCE_RETENTION_HOURS:-24}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:?FRONTEND_BASE_URL is required}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      CORS_ALLOWED_ORIGIN_REGEX: ${CORS_ALLOWED_ORIGIN_REGEX-}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:?SPOTIFY_REDIRECT_URI is required}
      IMAGE_GENERATOR_MODE: ${IMAGE_GENERATOR_MODE:-mock}
      MUSIC_SELECTOR_MODE: ${MUSIC_SELECTOR_MODE:-mock}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - backend_storage:/app/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    command:
      - celery
      - -A
      - app.tasks.celery_app.celery_app
      - worker
      - --loglevel=info
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-storyforge}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-storyforge}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "false"
      STORAGE_BACKEND: local
      STORAGE_LOCAL_ROOT: /app/data/storage
      SOURCE_RETENTION_HOURS: ${SOURCE_RETENTION_HOURS:-24}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:?FRONTEND_BASE_URL is required}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:?SPOTIFY_REDIRECT_URI is required}
      IMAGE_GENERATOR_MODE: ${IMAGE_GENERATOR_MODE:-mock}
      MUSIC_SELECTOR_MODE: ${MUSIC_SELECTOR_MODE:-mock}
    volumes:
      - backend_storage:/app/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    command:
      - npm
      - run
      - start
      - --
      - --hostname
      - 0.0.0.0
      - --port
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Story Forge}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/fr').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  backend_storage:
